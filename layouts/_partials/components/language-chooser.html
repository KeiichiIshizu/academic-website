{{ $page := .page }}
{{ $class := .class }}
{{ $hide_language_name := false }}
{{ $str_languages := T "languages" }}

{{- if $page.IsTranslated -}}
  <div x-data="{ open: false }" class="flex justify-items-start relative {{ with $class }}{{. | safeCSS }}{{ end }}">
    <button
      @click="open = !open"
      title="{{ $str_languages }}"
      class="grow h-7 rounded-md px-2 text-left text-xs font-medium text-gray-600 transition-colors dark:text-gray-400 hover:bg-gray-100 hover:text-gray-900 dark:hover:bg-primary-100/5 dark:hover:text-gray-50 inline-flex items-center gap-2 capitalize"
      type="button"
      aria-label="{{ $str_languages }}"
    >
      {{- partial "functions/get_icon" (dict "name" "globe-alt" "attributes" "height=18") -}}
      {{- if not $hide_language_name -}}<span>{{ index hugo.Data.languages $page.Lang }}</span>{{ end -}}
      <svg class="h-4 w-4 fill-current transition-transform" :class="{'rotate-180': open}" viewBox="0 0 20 20">
        <path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z" />
      </svg>
    </button>
    <ul
      x-show="open"
      @click.away="open = false"
      x-transition:enter="transition ease-out duration-100"
      x-transition:enter-start="transform opacity-0 scale-95"
      x-transition:enter-end="transform opacity-100 scale-100"
      x-cloak
      class="absolute right-0 top-full mt-2 min-w-[120px] z-50 overflow-hidden rounded-md ring-1 ring-black/5 bg-white py-1 text-sm shadow-lg dark:ring-white/20 dark:bg-neutral-800"
    >
      {{ range $page.Translations }}
        <li class="flex flex-col">
          <a
            href="{{ .Permalink }}"
            class="block cursor-pointer px-4 py-2 text-gray-800 dark:text-gray-100 hover:bg-primary-50 hover:text-primary-600 hover:dark:bg-primary-500/10 hover:dark:text-primary-200 transition-colors whitespace-nowrap"
          >
            {{- index hugo.Data.languages .Lang -}}
          </a>
        </li>
      {{ end -}}
    </ul>
  </div>
{{- end -}}
